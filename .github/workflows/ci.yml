name: CI

on:
  pull_request:
    branches:
      - master
      - main
      - dev
  push:
    branches:
      - master
      - main
      - dev

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run type-check

      - name: Build
        env:
          SKIP_ENV_VALIDATION: true
        run: bun run build
