name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * 0'

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.5
        with:
          configurationFile: renovate.json
          token: ${{ secrets.GITHUB_TOKEN }}
